name: E2E Tests

on:
  deployment_status:

jobs:
  check-pr-status:
    name: Check if PR is open
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    outputs:
      pr-open: ${{ steps.pr-check.outputs.pr-open }}
      pr-number: ${{ steps.pr-check.outputs.pr-number }}
    steps:
      - name: Check PR status
        id: pr-check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.payload.deployment.sha
              });
              
              if (prs.length === 0) {
                console.log('No PR found for this deployment');
                core.setOutput('pr-open', 'false');
                core.setOutput('pr-number', '');
                return;
              }
              
              const pr = prs[0];
              const isOpen = pr.state === 'open';
              const isPromotionPR = pr.base && (pr.base.ref === 'qa' || pr.base.ref === 'prod' || pr.base.ref === 'main');
              
              console.log(`Found PR #${pr.number}, state: ${pr.state}, base: ${pr.base?.ref || 'unknown'}`);
              
              if (isPromotionPR) {
                console.log(`This is a promotion PR to ${pr.base.ref} - running tests regardless of PR state`);
                core.setOutput('pr-open', 'true');
                core.setOutput('pr-number', pr.number.toString());
              } else if (isOpen) {
                console.log(`PR is open - running tests`);
                core.setOutput('pr-open', 'true');
                core.setOutput('pr-number', pr.number.toString());
              } else {
                console.log(`Skipping tests - PR #${pr.number} is ${pr.state} and not a promotion PR`);
                core.setOutput('pr-open', 'false');
                core.setOutput('pr-number', pr.number.toString());
              }
            } catch (error) {
              console.error('Error checking PR status:', error);
              core.setOutput('pr-open', 'false');
              core.setOutput('pr-number', '');
            }

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-pr-status
    if: needs.check-pr-status.outputs.pr-open == 'true'
    permissions:
      actions: read
      contents: read
      pull-requests: write
      id-token: write
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::333022194791:role/web-app-e2e-tests
          aws-region: us-west-2

      - name: Debug deployment info
        run: |
          echo "Deployment environment: ${{ github.event.deployment_status.environment }}"
          echo "Deployment state: ${{ github.event.deployment_status.state }}"
          echo "Deployment URL: ${{ github.event.deployment_status.target_url }}"
          echo "Event name: ${{ github.event_name }}"

      - name: Set deployment URL
        id: deployment
        run: |
          DEPLOYMENT_URL="${{ github.event.deployment_status.target_url }}"
          echo "Using deployment URL: $DEPLOYMENT_URL"
          echo "BASE_URL=$DEPLOYMENT_URL" >> "$GITHUB_ENV"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        id: run-tests
        working-directory: e2e-tests
        run: npx playwright test
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_RUN_NAME: "E2E Tests - PR Preview"

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            e2e-tests/playwright-report
            e2e-tests/test-results
          retention-days: 30

      - name: Parse test results
        if: always()
        id: test-results
        shell: bash
        working-directory: e2e-tests
        run: |
          if [ -f "test-results/results.json" ]; then
            echo "Found results.json, parsing test results..."

            TOTAL_TESTS=$(cat test-results/results.json | jq '[.. | .specs? // empty | .[]] | length' 2>/dev/null || echo "0")
            FAILED_COUNT=$(cat test-results/results.json | jq '[.. | .specs? // empty | .[] | select(.ok == false)] | length' 2>/dev/null || echo "0")
            PASSED_COUNT=$(cat test-results/results.json | jq '[.. | .specs? // empty | .[] | select(.ok == true)] | length' 2>/dev/null || echo "0")

            echo "Parsed: Total=$TOTAL_TESTS, Failed=$FAILED_COUNT, Passed=$PASSED_COUNT"

            echo "total_tests=$TOTAL_TESTS" >> $GITHUB_OUTPUT
            echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT
            echo "passed_count=$PASSED_COUNT" >> $GITHUB_OUTPUT

            if [ "$FAILED_COUNT" -gt 0 ]; then
              FAILED_TESTS=$(cat test-results/results.json | jq -r '[.. | .specs? // empty | .[] | select(.ok == false) | .title] | .[:10] | .[]' 2>/dev/null | sed 's/^/• /' || echo "• Failed to parse test names")
              if [ -z "$FAILED_TESTS" ]; then
                FAILED_TESTS="• $FAILED_COUNT test(s) failed but names could not be parsed"
              fi
              echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
              echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "failed_tests=" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️  results.json file not found - tests may not have run"
            echo "failed_tests=• Test results file not found (tests may not have started)" >> $GITHUB_OUTPUT
            echo "failed_count=0" >> $GITHUB_OUTPUT
            echo "passed_count=0" >> $GITHUB_OUTPUT
            echo "total_tests=0" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with test results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { failed_count, passed_count, total_tests, failed_tests } = ${{ toJSON(steps.test-results.outputs) }};
            const testStatus = failed_count > 0 ? '❌' : '✅';
            const deploymentUrl = '${{ env.BASE_URL }}';

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.payload.deployment.sha
            });

            if (prs.length === 0) {
              console.log('No PR found for this deployment, skipping comment');
              return;
            }

            const prNumber = prs[0].number;
            console.log(`Found PR #${prNumber} for deployment`);

            let body = `## ${testStatus} E2E Test Results\n\n`;
            body += `**Preview Deployment:** ${deploymentUrl}\n\n`;
            body += `**Test Results:**\n`;
            body += `- ✅ Passed: ${passed_count}\n`;
            body += `- ❌ Failed: ${failed_count}\n`;
            body += `- 📊 Total: ${total_tests}\n\n`;

            if (failed_count > 0 && failed_tests) {
              body += `**Failed Tests:**\n${failed_tests}\n\n`;
            }

            body += `[View full test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Notify Slack on Test Success
        if: steps.run-tests.outcome == 'success'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: '✅ E2E Tests Passed',
              attachments: [{
                color: 'good',
                text: `${{ github.repository }} - ${{ github.ref_name }} by ${{ github.actor }}\nURL: ${{ env.BASE_URL }}\n✅ ${{ steps.test-results.outputs.passed_count }}/${{ steps.test-results.outputs.total_tests }} tests passed\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on Test Failure
        if: steps.run-tests.outcome == 'failure' || failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "⚠️ E2E Tests Failed",
              "attachments": [{
                "color": "warning",
                "text": "${{ github.repository }} - ${{ github.ref_name }} by ${{ github.actor }}\nURL: ${{ env.BASE_URL }}\n\n❌ ${{ steps.test-results.outputs.failed_count }} failed\n✅ ${{ steps.test-results.outputs.passed_count }} passed\n📊 ${{ steps.test-results.outputs.total_tests }} total\n\nFailed Tests:\n${{ steps.test-results.outputs.failed_tests || '(Unable to parse test results)' }}\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
