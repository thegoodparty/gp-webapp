<!-- Load fonts from Google Fonts CDN for Storybook previews.
     In the Next.js app, fonts are loaded via next/font in layout.tsx. But
     layout.tsx doesn't run in Storybook, so we load them here instead. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>

<!-- Set CSS variables that the Tailwind theme references via var().
     In the Next.js app these are set by next/font on the <html> element. -->
<style>
  :root {
    --open-sans-font: 'Open Sans', sans-serif;
  }
  /* Tailwind v4 preflight wipes the default body font. Restore it here so
     stories render in Open Sans without per-element inline overrides
     (next/font handles this on <html> in the running app). */
  body {
    font-family: 'Open Sans', sans-serif;
  }
</style>
